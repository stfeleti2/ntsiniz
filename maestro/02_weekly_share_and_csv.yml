appId: com.ntsiniz.app
---
- launchApp

# Unlock dev QA shortcut + skip calibration (dev builds)
- tapOn:
    id: "tap-welcome-title"
- tapOn:
    id: "tap-welcome-title"
- tapOn:
    id: "tap-welcome-title"
- tapOn:
    id: "tap-welcome-title"
- tapOn:
    id: "tap-welcome-title"
- tapOn:
    id: "tap-welcome-title"
- tapOn:
    id: "tap-welcome-title"
- tapOn:
    id: "btn-qa-skip-calibration"

# Generate some data quickly (1 drill)
- tapOn:
    id: "tab-Session"
- tapOn:
    id: "btn-session-start"
- tapOn:
    id: "btn-drill-start"
- tapOn:
    id: "btn-drillresult-next"

# Weekly report sharing + CSV export (both should be automatable in QA mode)
- tapOn:
    id: "tab-Journey"
- tapOn:
    id: "seg-journey-proof"
- assertVisible: "Weekly report"

- tapOn:
    id: "btn-journey-share-weekly"
- assertVisible: "Shared ✅"

- tapOn:
    id: "btn-journey-export-csv"
- assertVisible: "CSV ready ✅"
